<style>
/* ============================================================
   DESIGN TOKENS  -  retheme the whole configurator from here
   Swap these to match the HydrateServe site design system.
   ============================================================ */
:root{
  /* Matched to the main site's design system - keep these in step with
     index.html and residential/index.html if the site palette changes. */
  --ink:#0B1E26;          /* deep marine ink */
  --ink-soft:#22414D;     /* secondary text */
  --line:#DCE6E9;         /* hairlines / borders */
  --steel:#7C929C;        /* muted steel for labels */
  --paper:#F3F7F8;        /* glacial pale page bg */
  --card:#FFFFFF;         /* card bg */
  --water:#0F5468;        /* primary accent - deep glass blue */
  --water-deep:#0B3A47;
  --water-wash:#E9F0F2;   /* accent wash for selected states */
  --sky:#5BABD8;          /* light brand blue - logo accent */
  --radius:2px;
  --radius-lg:2px;
  --shadow:none;
  --shadow-lift:none;
  --ease:cubic-bezier(.22,.61,.36,1);
  --display:'Libre Baskerville',Georgia,serif;
  --body:'Figtree',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--body);color:var(--ink);background:var(--paper);
  line-height:1.5;-webkit-font-smoothing:antialiased;
  min-height:100vh;padding-bottom:96px;
}
/* ---------- top progress ---------- */
.topbar{position:sticky;top:0;z-index:20;background:rgba(251,252,251,.86);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.topbar-in{max-width:960px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:18px}
.brand{font-family:var(--display);font-weight:400;font-size:17px;letter-spacing:.28em;text-transform:uppercase;white-space:nowrap;color:var(--ink);text-decoration:none}
.brand span{color:var(--sky)}
.steps{display:flex;gap:6px;flex:1;margin:0 4px}
.steps .seg{flex:1;height:3px;border-radius:3px;background:var(--line);overflow:hidden}
.steps .seg i{display:block;height:100%;width:0;background:var(--water);transition:width .5s var(--ease)}
.steps .seg.done i{width:100%}
.steps .seg.active i{width:50%}
.stepnum{font-size:12.5px;color:var(--ink-soft);font-variant-numeric:tabular-nums;white-space:nowrap}
/* ---------- stage ---------- */
.stage{max-width:960px;margin:0 auto;padding:40px 24px 20px}
.screen{display:none;animation:rise .55s var(--ease) both}
.screen.in{display:block}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){.screen.in,.priceflash{animation:none!important}}
.eyebrow{font-size:11px;font-weight:500;letter-spacing:.34em;text-transform:uppercase;color:var(--steel);margin-bottom:16px}
h1.q{font-family:var(--display);font-weight:400;font-size:clamp(28px,4.4vw,44px);line-height:1.12;letter-spacing:.01em;max-width:16ch}
.sub{color:var(--ink-soft);font-size:16px;margin-top:14px;max-width:52ch}
.sub b{color:var(--ink);font-weight:600}
/* ---------- option cards ---------- */
.grid{display:grid;gap:16px;margin-top:34px}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
.gtaps{grid-template-columns:repeat(3,1fr)}
@media(max-width:720px){.g3,.g2,.gtaps{grid-template-columns:1fr 1fr}}
@media(max-width:460px){.g3,.g2,.gtaps{grid-template-columns:1fr}}
.opt{position:relative;background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius-lg);
  padding:24px;cursor:pointer;transition:transform .25s var(--ease),border-color .2s,box-shadow .25s;
  box-shadow:var(--shadow);text-align:left;display:flex;flex-direction:column;gap:8px;min-height:150px}
.opt:hover{transform:translateY(-3px);box-shadow:var(--shadow-lift);border-color:var(--water)}
.opt:focus-visible{outline:2.5px solid var(--water);outline-offset:3px}
.opt.sel{border-color:var(--water);background:var(--water-wash);box-shadow:0 0 0 1px var(--water),var(--shadow-lift)}
.opt.locked{cursor:default;opacity:.9}
.opt .ico{width:40px;height:40px;margin-bottom:4px;color:var(--water)}
.opt .name{font-family:var(--display);font-size:21px;font-weight:400;letter-spacing:.04em}
.opt .desc{font-size:13.5px;color:var(--ink-soft);line-height:1.45}
.opt .price-badge{font-size:13px;font-weight:600;color:var(--water-deep);margin-top:auto;font-variant-numeric:tabular-nums}
.opt .incl{font-size:12px;font-weight:600;color:var(--water);letter-spacing:.02em;margin-top:auto}
.check{position:absolute;top:16px;right:16px;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--line);
  display:grid;place-items:center;transition:.2s;background:#fff}
.opt.sel .check{background:var(--water);border-color:var(--water)}
.check svg{width:13px;height:13px;stroke:#fff;stroke-width:3;opacity:0;transition:.2s}
.opt.sel .check svg{opacity:1}
.tag{display:inline-block;font-size:11px;font-weight:600;color:var(--water-deep);background:var(--water-wash);
  border-radius:999px;padding:3px 9px;letter-spacing:.02em}
/* ---------- tap style carousel ---------- */
.taprail{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:34px}
.taprail>.opt{padding:18px;min-height:0;gap:4px}
@media(max-width:900px){.taprail{grid-template-columns:repeat(2,1fr)}}
@media(max-width:620px){
  .taprail{display:flex;grid-template-columns:none;gap:14px;overflow-x:auto;
    scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
    margin:34px -22px 0;padding:3px 22px 6px;scrollbar-width:none}
  .taprail::-webkit-scrollbar{display:none}
  .taprail>.opt{flex:0 0 78%;scroll-snap-align:center}
  .taprail>.opt:hover{transform:none}     /* no hover-lift on touch */
}
.raildots{display:none;justify-content:center;gap:7px;margin-top:14px}
.raildots i{width:6px;height:6px;border-radius:50%;background:var(--line);transition:.25s var(--ease)}
.raildots i.on{background:var(--water);width:18px;border-radius:3px}
@media(max-width:620px){.raildots{display:flex}}
.footnote{margin-top:22px;font-size:12.5px;color:var(--ink-soft)}
/* tap card */
.tap .shot{position:relative;aspect-ratio:4/5;border-radius:12px;background:
  radial-gradient(120% 90% at 50% 15%,#f4f7f6 0%,#eef2f1 55%,#e7edeb 100%);
  margin-bottom:8px;overflow:hidden}
.tap .shot .lay{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;
  mix-blend-mode:multiply;opacity:0;transition:opacity .18s linear}
.tap .shot .lay.on{opacity:1}
.tap .desc{margin-top:-2px}
/* finish swatches */
.finishes{display:flex;gap:9px;margin-top:12px;flex-wrap:wrap}
.sw{width:28px;height:28px;padding:0;border-radius:50%;border:2px solid #fff;
  box-shadow:0 0 0 1.5px var(--line);cursor:pointer;transition:transform .18s var(--ease),box-shadow .18s}
.sw:hover{transform:scale(1.08)}
.sw:focus-visible{outline:2.5px solid var(--water);outline-offset:3px}
.sw.on{box-shadow:0 0 0 2px var(--water),0 0 0 5px var(--water-wash)}
@media(prefers-reduced-motion:reduce){
  .tap .shot .lay{transition:none}
  .sw:hover,.opt:hover{transform:none}
}
/* ---------- fit check ---------- */
.fitq{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius);padding:22px;margin-top:16px;box-shadow:var(--shadow)}
.fitq h3{font-family:var(--display);font-weight:400;font-size:19px;letter-spacing:.04em;margin-bottom:4px}
.fitq p.hint{font-size:13.5px;color:var(--ink-soft);margin-bottom:14px}
.choices{display:flex;gap:10px;flex-wrap:wrap}
.chip{border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:9px 18px;font-size:14px;font-weight:500;
  cursor:pointer;transition:.18s;font-family:var(--body);color:var(--ink)}
.chip:hover{border-color:var(--water)}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.softnote{margin-top:14px;font-size:13.5px;color:var(--water-deep);background:var(--water-wash);
  border-radius:10px;padding:12px 14px;display:none}
.softnote.show{display:block;animation:rise .4s var(--ease) both}
.uploadbox{margin-top:16px;border:1.5px dashed var(--line);border-radius:12px;padding:20px;text-align:center;
  color:var(--ink-soft);font-size:14px;cursor:pointer;transition:.2s}
.uploadbox:hover{border-color:var(--water);color:var(--water-deep);background:var(--water-wash)}
/* ---------- summary ---------- */
.summary{background:var(--card);border:1.5px solid var(--line);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lift);overflow:hidden;margin-top:30px}
.sum-head{padding:26px 28px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap}
.sum-head .build{font-family:var(--display);font-size:24px;font-weight:400;letter-spacing:.03em}
.sum-head .fnrow{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.sum-price{text-align:right}
.sum-price .big{font-family:var(--display);font-size:38px;font-weight:400;letter-spacing:.01em;line-height:1}
.sum-price .lil{font-size:12.5px;color:var(--ink-soft);margin-top:5px}
.lines{padding:20px 28px}
.line{display:flex;justify-content:space-between;padding:9px 0;font-size:14.5px;border-bottom:1px solid var(--line)}
.line:last-child{border-bottom:0}
.line .l{color:var(--ink-soft)}
.line .r{font-variant-numeric:tabular-nums;font-weight:500}
.line .r.inc{color:var(--water);font-weight:600}
.clarifier{padding:18px 28px;background:var(--water-wash);font-size:13.5px;color:var(--water-deep);line-height:1.5;border-top:1px solid var(--line)}
.clarifier b{color:var(--water-deep)}
/* ---------- nav / price bar ---------- */
.footer{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(255,255,255,.9);
  backdrop-filter:blur(12px);border-top:1px solid var(--line)}
.footer-in{max-width:960px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:16px}
.runprice{display:flex;flex-direction:column;line-height:1.1}
.runprice .lbl{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);font-weight:600}
.runprice .val{font-family:var(--display);font-size:24px;font-weight:400;letter-spacing:.01em;font-variant-numeric:tabular-nums}
.runprice.priceflash .val{animation:flash .5s var(--ease)}
@keyframes flash{0%{color:var(--water)}100%{color:var(--ink)}}
.spacer{flex:1}
.btn{font-family:var(--body);font-weight:500;font-size:11.5px;letter-spacing:.24em;text-transform:uppercase;
  border-radius:100px;padding:15px 30px;cursor:pointer;
  border:1px solid transparent;transition:all .3s;white-space:nowrap}
.btn-ghost{background:transparent;color:var(--ink-soft);border-color:transparent}
.btn-ghost:hover{color:var(--ink)}
.btn-line{background:#fff;color:var(--ink);border-color:var(--line)}
.btn-line:hover{border-color:var(--ink)}
.btn-primary{background:var(--ink);color:#fff}
.btn-primary:hover{background:var(--water)}
.btn-primary:disabled{background:#C3CFD3;cursor:not-allowed}
.btn:focus-visible{outline:2.5px solid var(--water);outline-offset:2px}
@media(max-width:520px){
  .runprice .val{font-size:20px}.btn{padding:13px 20px;font-size:10.5px;letter-spacing:.18em}
  .footer-in{gap:10px;padding:12px 16px}.stage{padding:28px 16px 20px}
  .brand{font-size:14px;letter-spacing:.2em}.stepnum{display:none}
}
/* book form */
.form{margin-top:28px;display:grid;gap:14px;grid-template-columns:1fr 1fr}
.form .full{grid-column:1/-1}
.field label{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:6px}
.field input,.field select{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-family:var(--body);font-size:15px;background:#fff}
.field input:focus,.field select:focus{outline:none;border-color:var(--water)}
@media(max-width:520px){.form{grid-template-columns:1fr}}
.miniclar{font-size:12.5px;color:var(--ink-soft);margin-top:6px}
.errbox{margin-top:22px;padding:14px 16px;border:1px solid #C8846F;background:#FBF0EC;color:#8A3D24;font-size:14px;border-radius:var(--radius)}
.done-card{text-align:center;padding:50px 20px}
.done-card .tick{width:64px;height:64px;border-radius:50%;background:var(--water-wash);display:grid;place-items:center;margin:0 auto 20px}
.done-card .tick svg{width:30px;height:30px;stroke:var(--water);stroke-width:2.5;fill:none}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-in">
    <a class="brand" href="/" aria-label="HydrateServe - back to home">Hydrate<span>Serve</span></a>
    <div class="steps" id="steps"></div>
    <div class="stepnum" id="stepnum">Step 1 of 6</div>
  </div>
</div>

<div class="stage" id="stage"></div>

<div class="footer">
  <div class="footer-in">
    <div class="runprice" id="runprice">
      <span class="lbl">Your build</span>
      <span class="val" id="runval">-</span>
    </div>
    <div class="spacer"></div>
    <button class="btn btn-ghost" id="backBtn" onclick="back()" style="visibility:hidden">Back</button>
    <button class="btn btn-primary" id="nextBtn" onclick="next()">Continue</button>
  </div>
</div>

<script>
/* =============================================================
   PRICING CONFIG  -  plug your workbook numbers in here.
   Prices are RETAIL incl-GST placeholders. Replace with the
   six package retails + tap/finish/upgrade deltas from your sheet.
   ============================================================= */
const GST_RATE = 0.15;

// Retail incl-GST by resolved function combo, EXCLUDING the tap.
// Keys are the resolved function set (ambient always implied).
// Source: HydrateServe_Residential_Pricing_2.xlsx -> "Configurator Feed" tab
// (50% margin), less the tap that workbook bundles into every package:
// $235 landed / (1 - 0.50) = $470 ex-GST, +15% GST = $540.50.
// The tap is added back as TAP_PRICE once the customer picks one, so the
// running total on the first screen is the system only.
const BASE = {
  "ambient"                       : {ufx3:1277, ro:1726},  // filter only, no powered unit
  "chilled"                       : {ufx3:2542, ro:2991},  // + chiller
  "chilled+sparkling"             : {ufx3:3991, ro:4440},  // + chiller/sparkling unit + CO2
  "boiling"                       : {ufx3:2887, ro:3336},  // + boiler
  "chilled+boiling"               : {ufx3:4842, ro:5291},  // + chiller + boiler
  "chilled+sparkling+boiling"     : {ufx3:5601, ro:6050}   // full system
};

// Every tap is the same price, whatever the style or finish.
const TAP_PRICE = 379;

/* -------------------------------------------------------------
   TAP STYLES
   Style picker, not a product picker. The customer chooses a
   silhouette + finish; the matching tap is sourced afterwards.
   Every style carries the same value - no price deltas.

   `img`      = image filename stem
   `finishes` = [{key: canonical swatch, file: filename suffix}]
                so inconsistent file naming (polished/chrome,
                brushed/nickel) still shows one tidy swatch set.
   Image path = TAP_IMG_BASE + img + "_" + file + ".webp"
   ------------------------------------------------------------- */
const TAP_IMG_BASE = "/assets/taps/";  // absolute: this page lives at /finder/

const TAPS = [
  {id:"arc", name:"Arc", desc:"Curved gooseneck", img:"v7e3a7-curved",
    finishes:[{key:"chrome",file:"polished"},{key:"brushed",file:"brushed"},{key:"matte",file:"matte"}]},
  {id:"edge", name:"Edge", desc:"Squared spout", img:"v7e3a7-u",
    finishes:[{key:"chrome",file:"polished"},{key:"brushed",file:"brushed"},{key:"matte",file:"matte"}]},
  {id:"draw", name:"Draw", desc:"Squared spout, pull-out", img:"d7e794-u",
    finishes:[{key:"chrome",file:"chrome"},{key:"brushed",file:"nickel"},{key:"matte",file:"matte"},{key:"gold",file:"gold"}]},
  {id:"column", name:"Column", desc:"Squared spout, fixed", img:"e7b802",
    finishes:[{key:"brushed",file:"nickel"},{key:"matte",file:"matte"},{key:"gold",file:"gold"}]}
];

const FINISH_META = {
  chrome :{label:"Polished chrome", hex:"linear-gradient(145deg,#f2f5f6,#bcc4c7 48%,#e9edee)", delta:0},
  brushed:{label:"Brushed steel",   hex:"linear-gradient(145deg,#c9cecf,#a8aeb0 55%,#c1c6c7)", delta:0},
  matte  :{label:"Matte black",     hex:"#24272a", delta:0},
  gold   :{label:"Brushed gold",    hex:"linear-gradient(145deg,#cba76c,#a9814b 55%,#c3a068)", delta:0}
};

function tapImg(t, fkey){
  const f = t.finishes.find(x=>x.key===fkey) || t.finishes[0];
  return TAP_IMG_BASE + t.img + "_" + f.file + ".webp";
}
function preloadTaps(){
  TAPS.forEach(t=>t.finishes.forEach(f=>{ const i=new Image(); i.src=tapImg(t,f.key); }));
}

const FILTRATION = {
  ufx3:{label:"UFX3 Standard", desc:"3-stage filtration, bundled as standard."},
  ro:{label:"RO Upgrade", desc:"Reverse osmosis - removes fluoride and nitrate."}
};
// The RO uplift is ~$561 but varies by a dollar between combos, so read it
// from BASE rather than hardcoding a flat delta.
function roDelta(){ const b=BASE[comboKey()]; return b ? b.ro - b.ufx3 : 0; }

const ADDONS = {
  warranty:{label:"Extended warranty (+1 year)", price:249}
};
const CO2_NOTE = "CO₂ bottle + regulator included";

// Booking submissions land here. Every route posts the lead before doing
// anything else, so no enquiry is lost even when the gateway is not live.
const FORM_ENDPOINT = "https://formspree.io/f/xykrdyoj";

// Server-side checkout (worker/checkout.js). It recomputes the price from the
// build and hands back a Shopify checkout URL. Until the Worker is deployed
// this 404s, and startPayment() falls back to the "not switched on" screen.
const CHECKOUT_ENDPOINT = "/api/checkout";

// How the customer wants to proceed from the booking screen.
// "now" is the only route that touches the payment gateway - see startPayment().
const PAY_OPTIONS = [
  {key:"now", label:"Pay now",
   note:"Secure checkout. Your install slot is confirmed as soon as payment clears.",
   doneTitle:"Payment received", doneSub:"We'll be in touch to book your installation."},
  {key:"invoice", label:"Request an invoice",
   note:"We'll email an invoice with payment details - nothing to pay right now.",
   doneTitle:"Invoice requested", doneSub:"We'll email your invoice shortly."},
  {key:"call", label:"Request a call from us",
   note:"We'll call to talk the build through before anything is paid.",
   doneTitle:"We'll be in touch", doneSub:"One of our team will call you to talk it through."}
];

/* =============================================================
   STATE
   ============================================================= */
const state = {
  step:0,
  functions:new Set(),      // chilled / sparkling / boiling
  tap:null,
  finish:null,
  filtration:"ufx3",
  addons:new Set(),
  payment:null,             // now / invoice / call
  // Held in state, not read off the DOM, because render() rebuilds the
  // booking screen on every chip click and would otherwise wipe what was typed.
  contact:{name:"", email:"", phone:"", suburb:""},
  fit:{clearance:null, power:null, photo:false}
};

// Which screens are active (add-ons screen is conditional but we keep it; fit power row conditional)
function comboKey(){
  const f=[];
  if(state.functions.has("chilled")||state.functions.has("sparkling")) f.push("chilled");
  if(state.functions.has("sparkling")) f.push("sparkling");
  if(state.functions.has("boiling")) f.push("boiling");
  return f.length? f.join("+") : "ambient";
}
function hasPoweredUnit(){ return state.functions.size>0; } // any function = powered unit

/* =============================================================
   PRICE
   ============================================================= */
function calcPrice(){
  const b = BASE[comboKey()];
  let p = b ? b[state.filtration] : 0;   // filtration choice is priced into BASE
  // The tap only counts once one is chosen, so screen 1 shows the system alone.
  // Style and finish make no difference - every tap is the same price.
  if(state.tap) p += TAP_PRICE;
  if(state.addons.has("warranty")) p += ADDONS.warranty.price;
  return p; // one-off incl-GST
}
function money(n){ return "$"+n.toLocaleString("en-NZ"); }

function paintPrice(flash){
  const el=document.getElementById("runval");
  const rp=document.getElementById("runprice");
  if(state.functions.size===0 && !state.tap){ el.textContent="-"; return; }
  el.textContent=money(calcPrice());
  if(flash){ rp.classList.remove("priceflash"); void rp.offsetWidth; rp.classList.add("priceflash"); }
}

/* =============================================================
   SCREENS
   ============================================================= */
const FN_META = {
  chilled:{name:"Chilled", desc:"Cold filtered water on demand.",
    ico:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M12 3v18M5 7l14 10M19 7L5 17"/></svg>'},
  sparkling:{name:"Sparkling", desc:"Chilled + carbonated. Chilled is included.",

const STEP_LABELS=["Functions","Style","Filtration","Extras","Fit check","Your price","Book"];

/* =============================================================
   INTERACTIONS
   ============================================================= */
function toggleFn(k){
  if(state.functions.has(k)) state.functions.delete(k);
  else state.functions.add(k);
  // sparkling implies chilled
  if(state.functions.has("sparkling")) state.functions.add("chilled");
  // if a chosen tap no longer supports the set, clear it
  render(); paintPrice(true);
}
function pickTap(id){
  const t=TAPS.find(x=>x.id===id);
  state.tap=t;
  // keep the finish if this style offers it, otherwise fall back to its first
  if(!t.finishes.some(f=>f.key===state.finish)) state.finish=t.finishes[0].key;
  swapShot(t, state.finish);
  refreshTapUI(); paintPrice(true);
}
function pickFinish(id, fkey){
  const t=TAPS.find(x=>x.id===id);
  state.tap=t;                    // choosing a finish also chooses the style
  state.finish=fkey;
  swapShot(t, fkey);
  refreshTapUI(); paintPrice(true);
}

/* cross-fade the tap image between finishes (two stacked layers) */
function swapShot(t, fkey){
  const a=document.getElementById("shotA-"+t.id), b=document.getElementById("shotB-"+t.id);
  if(!a||!b) return;
  const src=tapImg(t,fkey);
  const front = a.classList.contains("on") ? a : b;
  const back  = front===a ? b : a;
  if(front.getAttribute("src")===src) return;   // already showing it
  const show=()=>{ back.classList.add("on"); front.classList.remove("on"); };
  back.alt = t.name+" tap in "+FINISH_META[fkey].label.toLowerCase();
  back.removeAttribute("aria-hidden"); front.setAttribute("aria-hidden","true"); front.alt="";
  if(back.getAttribute("src")===src && back.complete){ show(); }
  else { back.onload=show; back.src=src; }
}

/* update selection states without rebuilding the rail (keeps scroll position) */
function refreshTapUI(){
  TAPS.forEach(t=>{
    const card=document.getElementById("card-"+t.id);
    if(!card) return;
    const on = state.tap && state.tap.id===t.id;
    card.classList.toggle("sel", on);
    card.setAttribute("aria-checked", on);
    t.finishes.forEach(f=>{
      const sw=document.getElementById("sw-"+t.id+"-"+f.key);
      if(sw) sw.classList.toggle("on", on && state.finish===f.key);
    });
    if(!on) swapShot(t, t.finishes[0].key);   // unselected cards return to their default finish
  });
  const nb=document.getElementById("nextBtn"); if(nb) nb.disabled=!canProceed();
}

/* mobile carousel dots */
function bindRail(){
  const rail=document.getElementById("tapRail"), dots=document.getElementById("railDots");
  if(!rail||!dots) return;
  const paint=()=>{
    const kids=[...rail.children], mid=rail.scrollLeft+rail.clientWidth/2;
    let best=0, d=Infinity;
    kids.forEach((k,i)=>{ const c=k.offsetLeft+k.offsetWidth/2, dist=Math.abs(c-mid); if(dist<d){d=dist;best=i;} });
    [...dots.children].forEach((n,i)=>n.classList.toggle("on", i===best));
  };
  rail.addEventListener("scroll", ()=>{ clearTimeout(rail._t); rail._t=setTimeout(paint,60); }, {passive:true});
  paint();
}
function pickFilter(k){
  state.filtration=k;
  render(); paintPrice(true);
}
function toggleAddon(k){
  if(state.addons.has(k)) state.addons.delete(k); else state.addons.add(k);
  render(); paintPrice(true);
}
function setFit(key,val){ state.fit[key]=val; render(); }
function markPhoto(){ state.fit.photo=!state.fit.photo; render(); }
function setPayment(k){ state.payment=k; render(); }
function clearPay(){ state._payPending=false; render(); }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }
/* Typing must not re-render - that would rebuild the field and drop focus.
   Just hold the value and refresh whether Continue is allowed. */
function setContact(k,v){
  state.contact[k]=v;
  const nb=document.getElementById("nextBtn");
  if(nb) nb.disabled=!canProceed();
}

/* Post the lead before anything else, whichever route was chosen, so an
   enquiry is never lost. Only shows a confirmation if Formspree accepted it. */
async function submitBooking(){
  state._sending=true; state._error=null; render();
  const fns=[...state.functions];
  const payload={
    _subject:"HydrateServe configurator - "+(state.tap?state.tap.name:"tap")+" build",
    name:state.contact.name,
    email:state.contact.email,
    phone:state.contact.phone,
    suburb:state.contact.suburb,
    how_to_proceed:(PAY_OPTIONS.find(o=>o.key===state.payment)||{}).label||state.payment,
    build:comboKey(),
    functions:fns.length?fns.join(", "):"ambient only",
    tap:state.tap?state.tap.name:"",
    finish:state.finish?FINISH_META[state.finish].label:"",
    filtration:FILTRATION[state.filtration].label,
    extended_warranty:state.addons.has("warranty")?"Yes (+"+money(ADDONS.warranty.price)+")":"No",
    total_incl_gst:money(calcPrice()),
    fit_clearance:state.fit.clearance||"not answered",
    fit_power:hasPoweredUnit()?(state.fit.power||"not answered"):"n/a",
    fit_photo:state.fit.photo?"Customer said they have a photo":"none"
  };
  try{
    const res=await fetch(FORM_ENDPOINT,{
      method:"POST",
      headers:{"Content-Type":"application/json",Accept:"application/json"},
      body:JSON.stringify(payload)
    });
    if(!res.ok) throw new Error("HTTP "+res.status);
    state._sending=false;
    if(state.payment==="now"){ startPayment(); }
    else { state._booked=true; render(); }
  }catch(err){
    state._sending=false;
    state._error="We couldn't send that just now - please check your connection and try again.";
    render();
  }
}

/* =============================================================
   PAYMENT GATEWAY HOOK
   Called only when the customer picks "Pay now". Wire the provider's
   checkout in here - it needs calcPrice() for the incl-GST total and the
   build (comboKey(), state.tap, state.finish, state.filtration, addons).
   Typically this redirects to the provider, e.g.
     window.location = "/checkout?total=" + calcPrice() + "&build=" + comboKey();
   Until that exists nothing is charged, and the screen says so rather than
   showing a payment confirmation.
   ============================================================= */
async function startPayment(){
  state._sending=true; state._error=null; render();
  try{
    const res=await fetch(CHECKOUT_ENDPOINT,{
      method:"POST",
      headers:{"Content-Type":"application/json",Accept:"application/json"},
      body:JSON.stringify({
        functions:[...state.functions],
        filtration:state.filtration,
        warranty:state.addons.has("warranty"),
        tap:state.tap?state.tap.name:"",
        finish:state.finish?FINISH_META[state.finish].label:"",
        email:state.contact.email,
        fit_clearance:state.fit.clearance||"",
        fit_power:hasPoweredUnit()?(state.fit.power||""):""
      })
    });
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data=await res.json();
    if(!data.url) throw new Error("no checkout url");
    // The Worker prices the build itself. If its total disagrees with what we
    // showed, stop - never send someone to a checkout at a different number.
    if(typeof data.total==="number" && data.total!==calcPrice()) throw new Error("price mismatch");
    window.location.href=data.url;
    return;
  }catch(err){
    state._sending=false;
    state._payPending=true;   // shows "card payment isn't switched on yet"
    render();
  }
}
function softFlag(){
  const c=state.fit.clearance, p=state.fit.power;
  const bad=v=>v==="No"||v==="Not sure";
  return bad(c)||(hasPoweredUnit()&&bad(p));
}

/* =============================================================
   NAV + GATING
   ============================================================= */
function canProceed(){
  switch(state.step){
    case 0: return true; // ambient-only allowed
    case 1: return !!state.tap;              // must pick a tap
    case 2: return true;
    case 3: return true;
    case 4: return state.fit.clearance!==null && (!hasPoweredUnit()||state.fit.power!==null);
    case 5: return true;
    // Need a route plus enough to actually reply to them.
    case 6: return state.payment!==null && !state._sending
              && state.contact.name.trim()!=="" && /\S+@\S+\.\S+/.test(state.contact.email);
    default:return true;
  }
}
function next(){
  if(state.step===6){ // book
    if(!canProceed()) return;
    submitBooking();   // posts the lead, then routes to payment or confirmation
    return;
  }
  if(!canProceed()) return;
  state.step++; render();
}
function back(){ if(state.step>0){ state.step--; render(); } }

function render(){
  const stage=document.getElementById("stage");
  stage.innerHTML=`<div class="screen in">${screens[state.step]()}</div>`;
  // progress
  const steps=document.getElementById("steps");
  steps.innerHTML=STEP_LABELS.map((_,i)=>`<div class="seg ${i<state.step?'done':''} ${i===state.step?'active':''}"><i></i></div>`).join("");
  document.getElementById("stepnum").textContent=`${STEP_LABELS[state.step]} · ${state.step+1} of ${STEP_LABELS.length}`;
  // footer buttons - hidden once the journey has ended on a result screen
  const done = state._booked || state._payPending;
  document.getElementById("backBtn").style.visibility= (state.step===0||done)?"hidden":"visible";
  const nb=document.getElementById("nextBtn");
  nb.style.visibility = done?"hidden":"visible";
  nb.disabled=!canProceed();
  if(state.step===5){ nb.textContent="Book installation"; }
  else if(state.step===6){
    const o=PAY_OPTIONS.find(x=>x.key===state.payment);
    nb.textContent = state._sending ? "Sending..." : (o ? o.label : "Choose an option");
  }
  else nb.textContent="Continue";
  if(state.step===1) bindRail();
  paintPrice(false);
  window.scrollTo({top:0,behavior:'smooth'});
}

preloadTaps();
render();
</script>
